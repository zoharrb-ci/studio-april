<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיעורי יוגה בסטודיו קשובה לחודש אפריל 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #fdfbf7; padding: 20px; color: #4a4a4a; }
        @media print { .no-print { display: none; } @page { size: landscape; margin: 1cm; } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background-color: #e2e8f0; border-radius: 8px; overflow: hidden; }
        .day-cell { background-color: white; min-height: 140px; padding: 8px; display: flex; flex-direction: column; border: 1px solid #f0f4f8; }
        .header-cell { background-color: #f0f4f8; font-weight: bold; text-align: center; padding: 10px; color: #5a6a8a; }
        .date-num { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .yoga-class { font-size: 0.75rem; line-height: 1.3; padding: 6px; border-radius: 4px; margin-bottom: 4px; background-color: #e6f7f2; border-right: 4px solid #b2d8d0; }
        .holiday { font-size: 0.75rem; font-weight: bold; color: #d68a8a; background-color: #fff1f1; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; }
        .other-month { background-color: #f9f9f9; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-700">שיעורי יוגה בסטודיו קשובה לחודש אפריל 2026</h1>
            <div id="status" class="text-sm text-emerald-600 font-medium mt-2">טוען נתונים...</div>
        </header>

        <div class="calendar-grid" id="calendar">
            <div class="header-cell">ראשון</div><div class="header-cell">שני</div><div class="header-cell">שלישי</div><div class="header-cell">רביעי</div><div class="header-cell">חמישי</div><div class="header-cell">שישי</div><div class="header-cell">שבת</div>
        </div>

        <footer class="mt-8 pt-4 border-t flex justify-between items-center no-print">
            <div class="text-xs text-gray-400">סנכרון אוטומטי מול Google Sheets</div>
            <button onclick="fetchClasses()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-lg transition">עדכן עכשיו</button>
        </footer>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMvoPaqs1EIxHWPhXGEEOZwjphNZGLhOdc0KusQlASx_9kr2vtILF9jDMBvo_mEhqWJZD1_LPa_zWj/pub?gid=0&single=true&output=csv';
        
        const holidays = { "15": "🕯️ יום השואה", "21": "🕯️ ערב יום הזיכרון", "22": "🕯️ יום הזיכרון", "23": "🇮🇱 יום העצמאות" };

        function initCalendar() {
            const grid = document.getElementById('calendar');
            const headers = Array.from(grid.querySelectorAll('.header-cell'));
            grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));
            for (let i = 0; i < 3; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day-cell other-month'}));
            for (let d = 1; d <= 30; d++) {
                const cell = Object.assign(document.createElement('div'), {className: 'day-cell', id: `day-${d}`});
                cell.innerHTML = `<span class="date-num">${d}</span>`;
                if (holidays[d]) cell.innerHTML += `<div class="holiday">${holidays[d]}</div>`;
                grid.appendChild(cell);
            }
        }

        async function fetchClasses() {
            try {
                const res = await fetch(CSV_URL + '&cachebust=' + Date.now());
                const text = await res.text();
                parseData(text);
                document.getElementById('status').textContent = 'מחובר ומעודכן ✅';
            } catch (e) {
                document.getElementById('status').textContent = 'שגיאת חיבור ❌';
            }
        }

        function parseData(csv) {
            document.querySelectorAll('.yoga-class').forEach(e => e.remove());
            const lines = csv.replace(/\r/g, '').split('\n');
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            // מציאת אינדקסים לפי שם עמודה - הופך את הקוד לאמין בהרבה!
            const idx = {
                type: headers.indexOf('סוג שיעור'),
                teacher: headers.indexOf('מורה'),
                time: headers.indexOf('זמן'),
                date: headers.indexOf('תאריך')
            };

            lines.slice(1).forEach(line => {
                const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
                if (cols[idx.date] && cols[idx.date].includes('/04/2026')) {
                    const day = parseInt(cols[idx.date].split('/')[0]);
                    const cell = document.getElementById(`day-${day}`);
                    if (cell) {
                        const div = document.createElement('div');
                        div.className = 'yoga-class';
                        div.innerHTML = `<strong>${cols[idx.time]}</strong><br>${cols[idx.type]} ${cols[idx.teacher] ? '<br><i>'+cols[idx.teacher]+'</i>' : ''}`;
                        cell.appendChild(div);
                    }
                }
            });
        }

        window.onload = () => { initCalendar(); fetchClasses(); };
    </script>
</body>
</html>
